<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>frame</title>
<style>
  body { margin:0; background:#333; display:flex; gap:16px; padding:16px; font:12px sans-serif; }
  figure { margin:0; }
  figcaption { color:#fff; padding:4px 0; }
  iframe { border:0; background:#fff; display:block; }
  .m iframe { width:414px; height:1480px; }
  .t iframe { width:834px; height:1480px; }
</style></head>
<body>
<figure class="m"><figcaption>모바일 414 × 1480</figcaption><iframe src="../index.html"></iframe></figure>
<figure class="t"><figcaption>태블릿 834 × 1480</figcaption><iframe src="../index.html"></iframe></figure>
</body></html>
